workflows:
  main-workflow:
    name: TPhimX iOS Release Pipeline
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - txa
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Get version from pubspec.yaml
        script: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "VERSION=$VERSION" >> $CM_ENV
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --no-codesign
      - name: Create GitHub Release & Upload IPA
        script: |
          TAG="v$VERSION"
          RELEASE_NAME="TPhimX iOS Release $TAG"
          CHANGELOG=$(git log -10 --pretty=format:"- %s")

          echo "Creating release $TAG on GitHub..."

          # Tạo Release
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$CM_REPO_OWNER/$CM_REPO_NAME/releases \
            -d @- <<EOF
          {
            "tag_name": "$TAG",
            "name": "$RELEASE_NAME",
            "body": "$(echo "$CHANGELOG" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')",
            "draft": false,
            "prerelease": false
          }
          EOF
          )

          UPLOAD_URL=$(echo $RESPONSE | jq -r .upload_url | sed 's/{?name,label}//')

          # Nếu tag đã tồn tại, lấy upload_url của release cũ để tránh lỗi
          if [ "$UPLOAD_URL" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "Release already exists or error occurred. Fetching existing release upload URL..."
            UPLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/$CM_REPO_OWNER/$CM_REPO_NAME/releases/tags/$TAG \
              | jq -r .upload_url | sed 's/{?name,label}//')
          fi

          echo "Uploading IPA..."
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            curl -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @$IPA_PATH \
              "$UPLOAD_URL?name=TPhimX-Premium-v$VERSION.ipa"
            echo "IPA Uploaded successfully."
          else
            echo "Error: No IPA found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa