workflows:
  main-workflow:
    name: "📦 [TPhimX] iOS Premium Automation (Final)"
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - txa
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Get version from pubspec.yaml
        script: |
          VERSION=$(grep "^version: " pubspec.yaml | sed 's/version: //' | tr -d '\r')
          # Sanitize tag for GitHub
          TAG="v${VERSION//+/_}"
          echo "VERSION=$VERSION" >> $CM_ENV
          echo "TAG=$TAG" >> $CM_ENV
          echo "Current version: $VERSION | Sanity Tag: $TAG"
      - name: Build & Manual Package iOS IPA
        script: |
          echo "Building iOS for version $VERSION..."
          flutter build ios --release --no-codesign
          
          echo "Packaging .app into .ipa..."
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "TPhimX-Premium-v$VERSION.ipa" Payload
          cd ../../..
      - name: Create GitHub Release & Upload IPA (via GH CLI)
        script: |
          # Use GitHub CLI for robust release management
          export GITHUB_TOKEN=$GITHUB_TOKEN
          
          echo "Creating or Updating Release $TAG on GitHub..."
          
          CHANGELOG=$(git log -10 --pretty=format:"- %s")
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)

          if [ -z "$IPA_FILE" ]; then
            echo "Error: IPA file not found."
            exit 1
          fi

          # Try creating the release first, then upload the asset
          # If release exists, it'll just fail creation and we move to upload
          gh release create "$TAG" \
            --repo "$CM_REPO_OWNER/$CM_REPO_NAME" \
            --title "TPhimX Release $TAG" \
            --notes "$CHANGELOG" || echo "Release $TAG already exists, proceeding to upload."

          echo "Uploading $IPA_FILE..."
          gh release upload "$TAG" "$IPA_FILE" \
            --repo "$CM_REPO_OWNER/$CM_REPO_NAME" \
            --clobber
          
          echo "Release and Upload completed successfully."
    artifacts:
      - build/ios/ipa/*.ipa