workflows:
  main-workflow:
    name: TPhimX iOS Release Pipeline
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - txa
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Get version from pubspec.yaml
        script: |
          VERSION=$(grep "^version: " pubspec.yaml | sed 's/version: //' | tr -d '\r')
          echo "VERSION=$VERSION" >> $CM_ENV
          echo "Current project version: $VERSION"
      - name: Build & Manual Package iOS IPA
        script: |
          echo "Building iOS for version $VERSION..."
          flutter build ios --release --no-codesign
          
          echo "Packaging .app into .ipa..."
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "TPhimX-Premium-v$VERSION.ipa" Payload
          cd ../../..
      - name: Create GitHub Release & Upload IPA
        script: |
          TAG="v$VERSION"
          # Get git changelog directly
          CHANGELOG=$(git log -10 --pretty=format:"- %s")

          echo "Creating release $TAG on GitHub..."

          # Fix Python booleans (must be False instead of false)
          JSON_DATA=$(python3 -c "import json, sys; print(json.dumps({'tag_name': sys.argv[1], 'name': 'TPhimX Release ' + sys.argv[1], 'body': sys.argv[2], 'draft': False, 'prerelease': False}))" "$TAG" "$CHANGELOG")

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$CM_REPO_OWNER/$CM_REPO_NAME/releases \
            -d "$JSON_DATA")

          UPLOAD_URL=$(echo $RESPONSE | jq -r .upload_url | sed 's/{?name,label}//')

          if [ "$UPLOAD_URL" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "Release entry failed or already exists. Fetching upload URL for tag $TAG..."
            UPLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/$CM_REPO_OWNER/$CM_REPO_NAME/releases/tags/$TAG \
              | jq -r .upload_url | sed 's/{?name,label}//')
          fi

          if [ "$UPLOAD_URL" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "Failed to resolve UPLOAD_URL. Final response from GitHub:"
            echo $RESPONSE
            exit 1
          fi

          echo "Uploading IPA..."
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_FILE" ]; then
            FILE_NAME=$(basename "$IPA_FILE")
            curl -L -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$IPA_FILE" \
              "$UPLOAD_URL?name=$FILE_NAME"
            echo "IPA $FILE_NAME uploaded successfully."
          else
            echo "Error: IPA file not found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa