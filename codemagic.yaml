workflows:
  premium-release-workflow:
    name: "🚀 [TPhimX] iOS Premium Auto-Release"
    instance_type: mac_mini_intel
    max_build_duration: 60
    environment:
      groups:
        - txa
      vars:
        PACKAGE_NAME: "TPHIMX-Premium"
        REPO_ID: "TXAVLOG/tphimx-setup"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 🛠 Clean & Get Dependencies
        script: |
          flutter clean
          flutter pub get
      - name: 🏷 Prepare Version & Git Tag
        script: |
          VERSION=$(grep "^version: " pubspec.yaml | sed 's/version: //' | tr -d '\r')
          TAG="v${VERSION//+/_}"
          echo "VERSION=$VERSION" >> $CM_ENV
          echo "TAG=$TAG" >> $CM_ENV
          echo "Current version identified: $VERSION (Tag: $TAG)"
      - name: 🍎 Build & Package iOS IPA (No-CodeSign)
        script: |
          echo "Building iOS for v$VERSION..."
          flutter build ios --release --no-codesign
          
          echo "Packaging .app into .ipa (Enterprise/Ad-hoc Style)..."
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          # Use PACKAGE_NAME from env
          zip -r "$PACKAGE_NAME-v$VERSION.ipa" Payload
          cd ../../..
      - name: 🚀 Create GitHub Tags & Release
        script: |
          # Use GitHub CLI for robust release management
          export GITHUB_TOKEN=$GITHUB_TOKEN
          
          # Git Tagging with Token Auth
          echo "Tagging current commit with $TAG..."
          git tag "$TAG" || echo "Tag already exists"
          
          echo "Pushing tag to remote..."
          git push https://x-access-token:$GITHUB_TOKEN@github.com/$REPO_ID.git "$TAG" || echo "Tag already pushed"

          echo "Generating changelog..."
          CHANGELOG=$(git log -1 --pretty=format:"%s%n%nFull changes:%n- %b")
          
          # Find Build Artifacts (iOS Only)
          IPA_FILE=$(find build/ios/ipa -name "$PACKAGE_NAME-v$VERSION.ipa" | head -n 1)

          # Validation
          if [ ! -f "$IPA_FILE" ]; then
            echo "❌ Error: IPA file $IPA_FILE NOT FOUND for upload."
            exit 1
          fi

          echo "Creating Release $TAG on GitHub (as Latest)..."
          gh release create "$TAG" \
            --repo "$REPO_ID" \
            --title "TPhimX Premium iOS v$VERSION" \
            --notes "$CHANGELOG" \
            --latest || echo "Release $TAG already exists."

          # Upload IPA Asset
          echo "Uploading IPA: $IPA_FILE"
          gh release upload "$TAG" "$IPA_FILE" \
            --repo "$REPO_ID" \
            --clobber
          
          echo "✅ iOS Release and Upload completed successfully."
    artifacts:
      - build/ios/ipa/*.ipa

  android-release-workflow:
    name: "🤖 [TPhimX] Android Auto-Release"
    instance_type: linux_m
    max_build_duration: 30
    environment:
      groups:
        - txa
      vars:
        PACKAGE_NAME: "TPHIMX-Android"
        REPO_ID: "TXAVLOG/tphimx-setup"
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 🛠 Clean & Get Dependencies
        script: |
          flutter clean
          flutter pub get
      - name: 🏷 Prepare Version & Git Tag
        script: |
          VERSION=$(grep "^version: " pubspec.yaml | sed 's/version: //' | tr -d '\r')
          TAG="v${VERSION//+/_}"
          echo "VERSION=$VERSION" >> $CM_ENV
          echo "TAG=$TAG" >> $CM_ENV
          echo "Current version identified: $VERSION (Tag: $TAG)"
      - name: 🤖 Build Android APK
        script: |
          echo "Building Android APK for v$VERSION..."
          if flutter build apk --release; then
            echo "✅ APK build successful."
          else
            echo "❌ APK build failed! Check logs above."
            exit 1
          fi
          
          # Rename for clarity
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/$PACKAGE_NAME-v$VERSION.apk
      - name: 🚀 Upload to GitHub Release
        script: |
          export GITHUB_TOKEN=$GITHUB_TOKEN
          
          # Check if tag exists, create if not (handle race condition with iOS build)
          git tag "$TAG" || echo "Tag already exists locally"
          git push https://x-access-token:$GITHUB_TOKEN@github.com/$REPO_ID.git "$TAG" || echo "Tag already pushed"

          APK_FILE="build/app/outputs/flutter-apk/$PACKAGE_NAME-v$VERSION.apk"

          if [ ! -f "$APK_FILE" ]; then
            echo "❌ Error: APK file $APK_FILE NOT FOUND."
            exit 1
          fi

          echo "Ensuring Release $TAG exists..."
          gh release create "$TAG" \
            --repo "$REPO_ID" \
            --title "TPhimX v$VERSION" \
            --notes "Auto-generated release for Android and iOS" \
            --latest || echo "Release $TAG already exists."

          echo "Uploading Android APK: $APK_FILE"
          gh release upload "$TAG" "$APK_FILE" \
            --repo "$REPO_ID" \
            --clobber
          
          echo "✅ Android Release and Upload completed."
    artifacts:
      - build/app/outputs/flutter-apk/*.apk